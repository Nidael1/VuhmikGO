<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{.PageTitle}} — {{.AppName}}</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: system-ui, sans-serif; background: #f5f5f5; color: #1a1a1a; }
        header { background: #1a1a1a; color: #fff; padding: 1rem 2rem; }
        header h1 { font-size: 1.2rem; font-weight: 600; }
        main { padding: 2rem; max-width: 800px; margin: 0 auto; }
        h2 { font-size: 1.4rem; margin-bottom: 1.5rem; }
        .form-group { margin-bottom: 1.25rem; }
        label { display: block; font-size: 0.9rem; font-weight: 600; margin-bottom: 0.4rem; }
        input, textarea { width: 100%; padding: 0.6rem 0.8rem; border: 1px solid #ccc; border-radius: 4px; font-size: 0.95rem; font-family: inherit; }
        textarea { min-height: 160px; resize: vertical; }
        .btn { background: #1a1a1a; color: #fff; border: none; padding: 0.7rem 1.5rem; border-radius: 4px; cursor: pointer; font-size: 0.95rem; }
        .btn:hover { background: #333; }
        .badge-draft { display: inline-block; background: #e9ecef; color: #495057; font-size: 0.75rem; padding: 0.2rem 0.6rem; border-radius: 99px; margin-left: 0.5rem; }
        .error-box { background: #fff3f3; border: 1px solid #e53e3e; border-radius: 6px; padding: 1rem; margin-bottom: 1rem; }
        .error-code { font-family: monospace; font-weight: 700; color: #c53030; }
    </style>
</head>
<body>
    <header><h1>{{.AppName}}</h1></header>
    <main>
        <h2>{{.PageTitle}} <span class="badge-draft">BORRADOR</span></h2>
        {{if .ErrorCode}}
        <div class="error-box">
            <span class="error-code">{{.ErrorCode}}</span>
            {{if .ErrorMessage}}<p>{{.ErrorMessage}}</p>{{end}}
        </div>
        {{end}}
        {{if .UXErrors}}
        <div class="error-box">
            {{range .UXErrors}}<p><span class="error-code">{{.Field}}</span>: {{.Message}}</p>{{end}}
        </div>
        {{end}}
        <form method="POST" action="/ece/nuevo">
            <div class="form-group">
                <label for="subject_id">ID del Paciente / Registro</label>
                <input type="text" id="subject_id" name="subject_id" placeholder="p-001" required>
            </div>
            <div class="form-group">
                <label for="notes">Nota Clínica (borrador)</label>
                <textarea id="notes" name="notes" placeholder="Ingrese la nota clínica..." required maxlength="2000"></textarea>
            </div>
            <button type="submit" class="btn">Guardar borrador</button>
        </form>
    </main>
</body>
</html>
